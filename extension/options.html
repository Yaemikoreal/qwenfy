<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwenfy 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    
    .section h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #333;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    input:focus,
    select:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .checkbox-group input {
      width: 16px;
      height: 16px;
    }
    
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #3498db;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2980b9;
    }
    
    .btn-secondary {
      background: #ecf0f1;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #bdc3c7;
    }
    
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>Qwenfy 设置</h1>
  
  <div class="section">
    <h2>翻译引擎</h2>
    
    <div class="form-group">
      <label for="provider">服务商</label>
      <select id="provider">
        <option value="qwen">通义千问 (Qwen)</option>
        <option value="openai">OpenAI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="local">本地模型 (Ollama)</option>
      </select>
    </div>
    
    <div class="form-group" id="apiKeyGroup">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="输入您的 API Key">
      <div class="hint">您的 API Key 将安全存储在浏览器中</div>
    </div>
    
    <div class="form-group" id="localModelGroup" style="display: none;">
      <label for="localModel">本地模型</label>
      <input type="text" id="localModel" placeholder="qwen2:7b">
      <div class="hint">确保 Ollama 已启动并下载了模型</div>
    </div>
  </div>
  
  <div class="section">
    <h2>缓存设置</h2>
    
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="cacheEnabled" checked>
        <label for="cacheEnabled">启用翻译缓存</label>
      </div>
      <div class="hint">缓存可以提高重复翻译的速度</div>
    </div>
    
    <div class="form-group">
      <label for="cacheSize">缓存大小</label>
      <input type="number" id="cacheSize" value="1000" min="100" max="10000">
      <div class="hint">最多缓存的翻译条目数量</div>
    </div>
  </div>
  
  <div class="buttons">
    <button class="btn-secondary" id="clearCacheBtn">清除缓存</button>
    <button class="btn-primary" id="saveBtn">保存设置</button>
  </div>
  
  <div class="status" id="status" style="display: none;"></div>
  
  <script src="options.js"></script>
</body>
</html>
